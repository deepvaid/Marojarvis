<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maropost · DaVinci</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#1c1f24;
    --ink-soft:#2b2f36;
    --dim:#8b929c;
    --dimmer:#aab0b8;
    --line:rgba(24,27,33,0.10);
    --line-soft:rgba(24,27,33,0.07);
    --card:#ffffff;
    --accent:#1877f2;
    --accent-press:#1564d6;
    --accent-tint:#e9f2fe;
    --r:14px;
    --orb:min(108vmin, 1040px);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow:hidden;
  }

  /* ---- top bar ---- */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:6;
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 28px; pointer-events:none;
  }
  .topbar > *{ pointer-events:auto; }
  .wordmark{ font-weight:800; font-size:21px; letter-spacing:0.01em; color:var(--ink); user-select:none; text-decoration:none; cursor:pointer; }
  .top-right{ display:flex; align-items:center; gap:10px; }
  .ghostbtn{
    display:inline-flex; align-items:center; gap:7px; cursor:pointer;
    background:#fff; border:1px solid var(--line); border-radius:999px;
    padding:9px 15px; font-size:13px; font-weight:500; color:var(--ink-soft);
    transition:border-color .2s, background .2s, transform .12s;
  }
  .ghostbtn:hover{ border-color:var(--ink-soft); }
  .ghostbtn:active{ transform:scale(.97); }
  .ghostbtn svg{ width:14px; height:14px; }
  #newchat{ display:none; }
  body.has-thread #newchat{ display:inline-flex; }

  /* ---- orb backdrop ---- */
  .orb-bg{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .stage{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  #orb{ position:absolute; inset:0; width:100%; height:100%; display:block; }



  /* ---- centered content over the orb ---- */
  .center{
    position:relative; z-index:1;
    height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(18px,3vh,30px); padding:96px 22px 30px; pointer-events:none;
  }
  .center > *{ pointer-events:auto; }
  body.has-thread .center{ justify-content:flex-end; padding-bottom:34px; }


  /* ---- conversation thread (active) ---- */
  .thread{
    width:min(620px,92vw); flex:0 1 auto; min-height:0; max-height:52vh; overflow-y:auto;
    display:flex; flex-direction:column; gap:24px; padding:10px 6px;
    scrollbar-width:thin; scrollbar-color:var(--line) transparent;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 26px, #000 calc(100% - 12px), transparent 100%);
            mask-image:linear-gradient(to bottom, transparent 0, #000 26px, #000 calc(100% - 12px), transparent 100%);
  }
  .thread:not(.on){ display:none; }
  .thread::-webkit-scrollbar{ width:7px; }
  .thread::-webkit-scrollbar-thumb{ background:var(--line); border-radius:999px; }

  .turn{ display:flex; flex-direction:column; gap:8px; animation:rise .5s var(--ease) both; }
  @keyframes rise{ from{ transform:translateY(10px); } to{ transform:none; } }
  .turn .role{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; text-transform:uppercase; color:var(--dimmer); }
  .turn.user{ align-items:flex-end; }
  .turn.user .role{ color:var(--accent); }
  .turn .msg{ font-size:16px; line-height:1.55; color:var(--ink); max-width:90%; text-wrap:pretty; }
  .turn.user .msg{ color:var(--ink-soft); font-weight:500; text-align:right; }

  /* ---- cards ---- */
  .card{ margin-top:4px; width:100%; max-width:430px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--r); box-shadow:0 1px 2px rgba(24,27,33,0.03), 0 16px 40px -24px rgba(24,27,33,0.34); overflow:hidden; }
  .card-head{ display:flex; align-items:center; gap:10px; padding:14px 16px 12px; border-bottom:1px solid var(--line-soft); }
  .card-head .ic{ width:30px; height:30px; border-radius:9px; background:var(--accent-tint); color:var(--accent); display:grid; place-items:center; flex:0 0 auto; }
  .card-head .ic svg{ width:16px; height:16px; }
  .card-head .ttl{ font-size:14px; font-weight:600; color:var(--ink); }
  .card-head .sub{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); margin-top:2px; }
  .card-head .chip{ margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-soft); background:#f3f4f6; border-radius:999px; padding:5px 10px; white-space:nowrap; }
  .card-grid{ padding:6px 16px 4px; }
  .row{ display:flex; align-items:baseline; gap:12px; padding:8px 0; border-bottom:1px dashed var(--line-soft); }
  .row:last-child{ border-bottom:0; }
  .row .k{ flex:0 0 116px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim); }
  .row .v{ font-size:14px; color:var(--ink); font-weight:500; }
  .row .v.mono{ font-family:'IBM Plex Mono',monospace; font-weight:400; }
  .card-actions{ display:flex; gap:8px; padding:12px 16px 14px; }
  .btn{ font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border-radius:9px; padding:10px 16px; border:1px solid transparent; transition:background .18s, border-color .18s, transform .1s, color .18s; }
  .btn:active{ transform:translateY(1px); }
  .btn.primary{ background:var(--accent); color:#fff; }
  .btn.primary:hover{ background:var(--accent-press); }
  .btn.ghost{ background:#fff; color:var(--ink-soft); border-color:var(--line); }
  .btn.ghost:hover{ border-color:var(--ink-soft); }
  .btn.done{ background:var(--accent-tint); color:var(--accent); pointer-events:none; }
  .btn .chk{ display:inline-flex; vertical-align:-2px; margin-right:6px; }
  .btn .chk svg{ width:13px; height:13px; }
  .metric{ padding:16px 16px 8px; display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; }
  .metric .big{ font-size:34px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); line-height:1; }
  .metric .delta{ font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; display:inline-flex; align-items:center; gap:4px; padding-bottom:3px; }
  .metric .delta.up{ color:#1f8a5b; }
  .metric .delta.down{ color:#c0533b; }
  .spark{ display:flex; align-items:flex-end; gap:4px; height:38px; margin-left:auto; padding-bottom:2px; }
  .spark i{ width:7px; background:var(--accent); border-radius:2px 2px 0 0; opacity:.32; }
  .spark i.last{ opacity:.92; }
  .quick{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .quick button{ font-family:'IBM Plex Mono',monospace; font-size:12px; background:#fff; border:1px solid var(--line); color:var(--ink-soft); border-radius:999px; padding:9px 15px; cursor:pointer; transition:border-color .18s, background .18s, color .18s; }
  .quick button:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-tint); }

  /* ---- composer (voice-first) ---- */
  .composer{ position:relative; width:min(560px,92vw); display:flex; flex-direction:column; align-items:center; gap:16px; }

  .voice-cta{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  body.has-thread .voice-cta{ display:none; }
  .bigmic{
    position:relative; width:clamp(78px,8.5vw,96px); height:clamp(78px,8.5vw,96px);
    border-radius:50%; border:1px solid var(--line); cursor:pointer; background:#f4f5f7; color:var(--dimmer);
    display:grid; place-items:center; box-shadow:0 4px 14px -8px rgba(24,27,33,.25);
    transition:transform .16s var(--ease), background .2s, color .2s;
  }
  .bigmic svg{ width:clamp(30px,3.2vw,36px); height:clamp(30px,3.2vw,36px); }
  .bigmic:hover{ transform:translateY(-3px) scale(1.03); color:var(--dim); }
  .bigmic:active{ transform:scale(.96); }
  .bigmic::after{ content:""; position:absolute; inset:0; border-radius:50%; border:1.5px solid rgba(24,27,33,.10); opacity:.6; animation:ring 3s var(--ease) infinite; }
  @keyframes ring{ 0%{ transform:scale(1); opacity:.55; } 80%,100%{ transform:scale(1.5); opacity:0; } }
  .bigmic.live{ background:#eceef1; color:var(--ink-soft); }
  .bigmic.live::after{ animation-duration:1.4s; }
  .voice-label{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--dim); min-height:14px; transition:color .3s; }
  body[data-state="listening"] .voice-label{ color:var(--accent); }

  .ortype{ display:flex; align-items:center; gap:12px; width:100%; color:var(--dimmer); font-size:9.5px; font-family:'IBM Plex Mono',monospace; letter-spacing:0.16em; text-transform:uppercase; }
  .ortype::before, .ortype::after{ content:""; flex:1; height:1px; background:var(--line); }
  body.has-thread .ortype{ display:none; }

  .inputrow{
    width:100%; display:flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:7px 7px 7px 20px; box-shadow:0 1px 2px rgba(24,27,33,.03), 0 18px 44px -28px rgba(24,27,33,.45);
    transition:border-color .2s, box-shadow .2s;
  }
  .inputrow:focus-within{ border-color:var(--accent); box-shadow:0 1px 2px rgba(24,27,33,.03), 0 0 0 4px var(--accent-tint); }
  .inputrow input{ flex:1; min-width:0; background:transparent; border:0; outline:0; font-family:'Inter',sans-serif; font-size:16px; color:var(--ink); padding:9px 0; }
  .inputrow input::placeholder{ color:var(--dim); }
  .iconbtn{ flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:0; cursor:pointer; display:grid; place-items:center; transition:background .18s, transform .1s, color .18s; }
  .iconbtn svg{ width:19px; height:19px; }
  .iconbtn:active{ transform:scale(.94); }
  .mic{ background:#f3f4f6; color:var(--ink-soft); }
  .mic:hover{ background:#e9eaed; }
  .mic.live{ background:var(--accent); color:#fff; animation:micpulse 1.5s ease infinite; }
  @keyframes micpulse{ 0%{ box-shadow:0 0 0 0 rgba(24,118,242,.45); } 70%{ box-shadow:0 0 0 12px rgba(24,118,242,0); } 100%{ box-shadow:0 0 0 0 rgba(24,118,242,0); } }
  .inputrow .mic{ display:none; }
  body.has-thread .inputrow .mic{ display:grid; }
  .send{ background:var(--accent); color:#fff; }
  .send:hover{ background:var(--accent-press); }
  .send:disabled{ background:#e7e8eb; color:var(--dimmer); cursor:default; transform:none; }

  .statepill{ display:inline-flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.26em; text-transform:uppercase; color:var(--dimmer); }
  .statepill .pip{ width:6px; height:6px; border-radius:50%; background:var(--dimmer); transition:background .4s, box-shadow .4s; }
  body[data-state="listening"] .statepill .pip{ background:var(--accent); box-shadow:0 0 0 3px var(--accent-tint); animation:pulse 1.4s var(--ease) infinite; }
  body[data-state="thinking"] .statepill .pip{ background:var(--ink-soft); animation:pulse 1s ease infinite; }
  body[data-state="speaking"] .statepill .pip{ background:var(--ink-soft); animation:pulse .7s ease infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.55); opacity:.55; } }

  .chips{ position:absolute; top:calc(100% + 6px); left:0; right:0; display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
    opacity:0; visibility:hidden; transform:translateY(-4px); transition:opacity .25s var(--ease), transform .25s var(--ease), visibility .25s; }
  body.input-focused .chips{ opacity:1; visibility:visible; transform:none; }
  body.has-thread .chips{ display:none; }
  .chip-s{ font-family:'IBM Plex Mono',monospace; font-size:12px; background:#fff; border:1px solid var(--line); color:var(--ink-soft); border-radius:999px; padding:9px 15px; cursor:pointer; transition:border-color .18s, color .18s, background .18s, transform .1s; }
  .chip-s:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-tint); }
  .chip-s:active{ transform:scale(.97); }

  .toast{ position:fixed; left:50%; bottom:26px; transform:translate(-50%,18px); background:var(--ink); color:#fff; font-size:13px; padding:11px 18px; border-radius:10px; opacity:0; pointer-events:none; transition:opacity .3s, transform .3s; z-index:40; font-family:'IBM Plex Mono',monospace; letter-spacing:0.02em; box-shadow:0 16px 40px -16px rgba(24,27,33,.5); }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  @media (max-width:560px){
    .topbar{ padding:16px 18px; }
    .wordmark{ font-size:18px; }
    .ghostbtn{ padding:8px 12px; font-size:12px; }
    .turn .msg{ font-size:15px; }
    .row .k{ flex-basis:96px; }
    .thread{ max-height:46vh; }
  }
  @media (max-height:680px){
    .center{ gap:14px; }
  }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; } }
</style>
</head>
<body data-state="idle">

  <div class="topbar">
    <a class="wordmark" href="landing.html">MAROPOST</a>
    <div class="top-right">
      <button class="ghostbtn" id="newchat" title="New conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New
      </button>
      <button class="ghostbtn" id="classicUI" title="Open the classic Maropost dashboard">Open classic UI</button>
    </div>
  </div>

  <div class="orb-bg">
    <div class="stage">
      <canvas id="orb"></canvas>

    </div>
  </div>

  <div class="center">

    <section class="thread" id="thread" aria-live="polite"></section>

    <div class="composer">
      <div class="voice-cta">
        <button class="bigmic" id="bigmic" aria-label="Tap to speak">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>
        </button>
        <div class="voice-label" id="voiceLabel"></div>
      </div>

      <form class="inputrow" id="form" autocomplete="off">
        <input id="input" type="text" placeholder="What do you want to work on?" aria-label="Message Maropost DaVinci">
        <button type="button" class="iconbtn mic" id="mic" aria-label="Speak" title="Speak">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>
        </button>
        <button type="submit" class="iconbtn send" id="send" aria-label="Send" title="Send" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </form>

      <div class="statepill"><span class="pip"></span><span id="statetext">idle</span></div>

      <div class="chips" id="chips">
        <button class="chip-s" data-cmd="Run a campaign">Run a campaign</button>
        <button class="chip-s" data-cmd="Add a product">Add a product</button>
        <button class="chip-s" data-cmd="Show last week's revenue">Show last week's revenue</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div id="tweaks-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks-app.jsx"></script>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }

<script type="module" src="app.js"></script>

</body>
</html>
