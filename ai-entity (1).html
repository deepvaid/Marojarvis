<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — AI Entity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#ffffff; --ink:#2b2f36; --dim:#9aa3ad; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--ink); font-family:'IBM Plex Mono',monospace; min-height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; position:relative; padding:24px; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(1200px 800px at 50% 46%, transparent 62%, rgba(43,47,54,0.03) 100%); }
  .hud-top { position:fixed; top:22px; left:0; right:0; display:flex; justify-content:space-between;
    padding:0 26px; font-size:11px; letter-spacing:0.28em; color:var(--dim); text-transform:uppercase; pointer-events:none; }
  .hud-top .dot { color:var(--ink); animation:blink 2.6s infinite; }
  @keyframes blink { 0%,70%{opacity:1} 85%{opacity:0.2} 100%{opacity:1} }
  .stage { position:relative; width:min(80vw,560px); height:min(80vw,560px); display:grid; place-items:center; }
  canvas { width:100%; height:100%; display:block; }
  .core { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:46%; text-align:center; pointer-events:auto; }
  .core-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
  .core-input { width:100%; background:transparent; border:0; border-bottom:1px solid rgba(43,47,54,0.28); outline:0;
    text-align:center; font-family:'Chakra Petch',sans-serif; font-size:clamp(13px,2vw,16px); color:var(--ink); padding:6px 2px; }
  .core-input::placeholder { color:var(--dim); font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.06em; }
  .core-input:focus { border-bottom-color:var(--ink); }
  .caption { margin-top:24px; text-align:center; font-family:'Chakra Petch',sans-serif; }
  .caption h1 { font-size:clamp(20px,3.4vw,28px); font-weight:700; letter-spacing:0.4em; color:var(--ink); margin-left:0.4em; }
  .caption .state { margin-top:6px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.32em; color:var(--dim); text-transform:uppercase; min-height:14px; }
  .console { margin-top:24px; width:min(94vw,640px); display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .field { flex:1 1 320px; display:flex; align-items:center; gap:10px; background:#fff; border:1px solid rgba(43,47,54,0.18); border-radius:2px; padding:0 14px; }
  .field span { color:var(--ink); font-size:13px; }
  .field input { flex:1; background:transparent; border:0; outline:0; color:var(--ink); font-family:'IBM Plex Mono',monospace; font-size:14px; padding:14px 0; }
  .field input::placeholder { color:var(--dim); }
  button { font-family:'Chakra Petch',sans-serif; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; font-size:12px;
    color:#fff; background:#3c424b; border:0; border-radius:2px; padding:14px 22px; cursor:pointer; transition:transform .12s,box-shadow .2s,background .2s; }
  button:hover { background:#21252b; box-shadow:0 6px 22px rgba(43,47,54,0.22); transform:translateY(-1px); }
  button:active { transform:translateY(0); }
  button.ghost { background:#fff; color:#3c424b; border:1px solid rgba(43,47,54,0.25); }
  button.ghost:hover { background:#f2f3f5; }
  button.ghost.live { color:#fff; background:#3c424b; }
  select { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink); background:#fff;
    border:1px solid rgba(43,47,54,0.18); border-radius:2px; padding:13px 12px; max-width:230px; cursor:pointer; }
  .hint { margin-top:16px; font-size:11px; color:var(--dim); letter-spacing:0.14em; text-align:center; max-width:560px; }
  .vname { font-size:11px; color:var(--dim); letter-spacing:0.12em; margin-top:8px; }
  .panel { margin-top:18px; width:min(94vw,640px); border:1px solid rgba(43,47,54,0.14); border-radius:3px; padding:14px; background:#fcfcfd; }
  .prow { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
  .prow:last-child { margin-bottom:0; }
  .prow label { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); min-width:96px; }
  .panel input { flex:1 1 240px; min-width:0; background:#fff; border:1px solid rgba(43,47,54,0.18); border-radius:2px;
    padding:11px 12px; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink); outline:0; }
  .panel select { flex:1 1 200px; }
  button.small { padding:11px 16px; font-size:11px; }
  .elbox { margin-top:10px; padding-top:10px; border-top:1px dashed rgba(43,47,54,0.14); }
  .elnote { font-size:10px; color:var(--dim); letter-spacing:0.1em; margin-top:4px; }
</style>
</head>
<body>
  <div class="hud-top"><span><span class="dot">●</span> SYS / ONLINE</span><span id="clock">--:--:--</span></div>
  <div class="stage">
    <canvas id="orb"></canvas>
    <div class="core">
      <div class="core-label">What would you like to do today?</div>
      <input id="text" class="core-input" type="text" placeholder="type here, then press Enter" autocomplete="off">
    </div>
  </div>
  <div class="caption"><h1>ARIA</h1><div class="state" id="state">standby</div></div>
  <div class="console">
    <select id="voice" title="Voice"><option>loading voices…</option></select>
    <button id="speak">Speak</button>
    <button id="mic" class="ghost">Listen</button>
  </div>
  <div class="vname" id="vname">voice: detecting…</div>
  <div class="hint">Type your intent in the centre, then press Enter or Speak · Listen reacts to your mic</div>

<script>
(() => {
  const canvas=document.getElementById('orb'), ctx=canvas.getContext('2d');
  const stateEl=document.getElementById('state'), clockEl=document.getElementById('clock'), vnameEl=document.getElementById('vname');
  const TAU=Math.PI*2;
  let W,H,CX,CY,R,DPR;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    const r=canvas.getBoundingClientRect(); W=r.width; H=r.height;
    canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    CX=W/2; CY=H/2; R=Math.min(W,H)*0.30;
  }
  window.addEventListener('resize',resize);

  const N=260, HALF=N/2;
  const spec=new Float32Array(HALF);
  const thorn=new Float32Array(N); for(let i=0;i<N;i++) thorn[i]=1;
  const rArr=new Float32Array(N);
  let speaking=false, listening=false, speakEnergy=0, micLevel=0, agit=0;
  let analyser=null, freqData=null, audioCtx=null, micStream=null;
  function setState(t){ stateEl.textContent=t; }

  // persistent needle-thorn sites — sharp fine spikes like the reference ink
  const SITES=54;
  const sites=Array.from({length:SITES},()=>({
    a: Math.random()*TAU,                 // angle around rim
    base: 0.05+Math.random()*0.20,        // resting length (fraction of R)
    ph: Math.random()*TAU,                 // shimmer phase
    sp: 0.001+Math.random()*0.003,         // shimmer speed
    w: 0.004+Math.random()*0.010           // angular half-width (thin)
  }));

  // one-off charcoal grain tile for ink texture
  const grain=document.createElement('canvas'); grain.width=grain.height=160;
  (()=>{ const g=grain.getContext('2d'); const img=g.createImageData(160,160); const d=img.data;
    for(let i=0;i<d.length;i+=4){ const v=Math.random()<0.5?0:(Math.random()*40|0); d[i]=d[i+1]=d[i+2]=20; d[i+3]=v; }
    g.putImageData(img,0,0); })();

  // small organic waviness on the OUTER edge only (inner stays a clean circle)
  const layers=[
    {a:0.016,k:2,p:Math.random()*TAU,w:-0.00090},
    {a:0.011,k:3,p:Math.random()*TAU,w:0.00140},
    {a:0.008,k:5,p:Math.random()*TAU,w:-0.00200},
    {a:0.005,k:8,p:Math.random()*TAU,w:0.00280},
    {a:0.003,k:13,p:Math.random()*TAU,w:-0.00380},
  ];
  function churn(a,t){ let d=0; for(const L of layers) d+=L.a*Math.sin(L.k*a+L.p+L.w*t); return d; }

  function path(scaleArr,pad){
    const p=new Path2D();
    for(let i=0;i<N;i++){
      const a=(i/N)*TAU-Math.PI/2, rr=scaleArr[i]+pad;
      const x=CX+Math.cos(a)*rr, y=CY+Math.sin(a)*rr;
      if(i===0) p.moveTo(x,y); else p.lineTo(x,y);
    }
    p.closePath(); return p;
  }

  function draw(time){
    if(speaking){ const tgt=0.5+0.5*Math.abs(Math.sin(time*0.011)*Math.cos(time*0.019)); speakEnergy+=(tgt-speakEnergy)*0.18; }
    else speakEnergy+=(0-speakEnergy)*0.06;
    if(analyser){ analyser.getByteFrequencyData(freqData); let s=0; for(let i=0;i<freqData.length;i++) s+=freqData[i]; micLevel=(s/freqData.length)/255; }
    else micLevel+=(0-micLevel)*0.1;
    agit+=(Math.min(1,speakEnergy+micLevel*1.6)-agit)*0.2;

    // EQ envelope, mirrored around the ring
    for(let b=0;b<HALF;b++){
      let raw;
      if(analyser){ const idx=Math.floor(Math.pow(b/HALF,1.3)*(freqData.length*0.78)); raw=freqData[idx]/255; }
      else if(speaking){ const wob=Math.abs(Math.sin(time*0.012+b*0.55)*Math.sin(time*0.02+b*0.9)); raw=speakEnergy*(0.35+0.65*wob)*(0.6+0.4*Math.random()); }
      else { raw=0.010+0.004*(0.5+0.5*Math.sin(time*0.0009+b*0.22)); } // quiet, steady idle
      const k=raw>spec[b]?0.5:0.18; spec[b]+=(raw-spec[b])*k;          // snappier EQ
    }
    // thorn flicker — lively shimmer even at rest, sharper/bigger spikes when active
    for(let i=0;i<N;i++) thorn[i]+=(1-thorn[i])*0.16;
    const sparks=2+Math.floor(agit*6);
    for(let s=0;s<sparks;s++){ if(Math.random()<0.22+agit*0.5){ const i=(Math.random()*N)|0; thorn[i]=1+(0.3+agit*1.3)*(0.5+Math.random()); } }

    // thin smooth band: small waviness only — sharp spikes come from needle thorns
    const breath=1+0.0015*Math.sin(time*0.0012);
    const ampSmooth=0.04;
    const ampThorn=0.05;
    for(let i=0;i<N;i++){
      const a=(i/N)*TAU-Math.PI/2;
      const b=i<HALF?i:(N-1-i);
      const spike=Math.max(0,thorn[i]-1)*ampThorn;
      rArr[i]=R*(breath+churn(a,time)+spec[b]*ampSmooth+spike);
    }
    const Rw=R*0.94;                 // fixed clean inner edge (thin rim)

    ctx.clearRect(0,0,W,H);

    // sample the EQ/agitation at a given angle (for thorn length response)
    const ampAt=(a)=>{
      let i=Math.round(((a+Math.PI/2)/TAU)*N); i=((i%N)+N)%N;
      const b=i<HALF?i:(N-1-i);
      return spec[b];
    };

    // ---- 1) asymmetric charcoal bleed (heavy lower-left, textured with offset blobs) ----
    ctx.save();
    if(typeof ctx.filter!=='undefined') ctx.filter='blur(15px)';
    const blobs=[[-0.62,0.26,1.15,0.34],[-0.42,0.5,0.85,0.22],[-0.7,-0.05,0.8,0.18],[0.15,-0.55,0.7,0.12]];
    for(const [ox,oy,rad,al] of blobs){
      const bx=CX+R*ox, by=CY+R*oy;
      const gg=ctx.createRadialGradient(bx,by,R*0.05,bx,by,R*rad);
      gg.addColorStop(0,`rgba(28,30,35,${al+agit*0.10})`);
      gg.addColorStop(1,'rgba(28,30,35,0)');
      ctx.fillStyle=gg; ctx.fillRect(0,0,W,H);
    }
    ctx.restore();

    // ---- 2) needle thorns (drawn first so the rim/ink overlaps their base) ----
    ctx.save();
    ctx.lineCap='round';
    for(const s of sites){
      const shimmer=0.6+0.4*Math.sin(time*s.sp+s.ph);
      const len=R*(s.base*shimmer*(0.55+agit*1.7)+ampAt(s.a)*0.5);
      if(len<R*0.01) continue;
      const baseR=R*0.9;
      const bx=CX+Math.cos(s.a)*baseR, by=CY+Math.sin(s.a)*baseR;
      const tx=CX+Math.cos(s.a)*(baseR+len), ty=CY+Math.sin(s.a)*(baseR+len);
      // thin tapered ink spike
      const perp=s.a+Math.PI/2, wpx=Math.cos(perp)*R*s.w, wpy=Math.sin(perp)*R*s.w;
      const sp=new Path2D();
      sp.moveTo(bx+wpx,by+wpy); sp.lineTo(tx,ty); sp.lineTo(bx-wpx,by-wpy); sp.closePath();
      const sg=ctx.createLinearGradient(bx,by,tx,ty);
      sg.addColorStop(0,'rgba(17,19,24,0.92)'); sg.addColorStop(1,'rgba(17,19,24,0)');
      ctx.fillStyle=sg; ctx.fill(sp);
    }
    ctx.restore();

    // ---- 3) soft charcoal rim (blurred dark band, gives the smudged-ink edge) ----
    ctx.save();
    if(typeof ctx.filter!=='undefined') ctx.filter='blur(3px)';
    const softRing=new Path2D();
    for(let i=0;i<N;i++){ const a=(i/N)*TAU-Math.PI/2, rr=rArr[i];
      const x=CX+Math.cos(a)*rr, y=CY+Math.sin(a)*rr; i===0?softRing.moveTo(x,y):softRing.lineTo(x,y); }
    softRing.closePath();
    softRing.moveTo(CX+Rw*0.99,CY); softRing.arc(CX,CY,Rw*0.99,0,TAU);
    ctx.fillStyle='rgba(22,24,29,0.85)'; ctx.fill(softRing,'evenodd');
    ctx.restore();

    // ---- 4) crisp dark ring on top (defines the thin sharp edge) ----
    const ring=new Path2D();
    for(let i=0;i<N;i++){ const a=(i/N)*TAU-Math.PI/2, rr=rArr[i];
      const x=CX+Math.cos(a)*rr, y=CY+Math.sin(a)*rr; i===0?ring.moveTo(x,y):ring.lineTo(x,y); }
    ring.closePath();
    ring.moveTo(CX+Rw,CY); ring.arc(CX,CY,Rw,0,TAU);
    ctx.fillStyle='#181b21'; ctx.fill(ring,'evenodd');

    // ---- 5) white interior with a subtle inner shadow on the heavy side ----
    ctx.save();
    ctx.beginPath(); ctx.arc(CX,CY,Rw,0,TAU); ctx.clip();
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    const ish=ctx.createRadialGradient(CX-R*0.5,CY+R*0.2,R*0.1,CX-R*0.5,CY+R*0.2,R*1.5);
    ish.addColorStop(0,'rgba(120,124,132,0.30)');
    ish.addColorStop(0.55,'rgba(150,154,160,0.10)');
    ish.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=ish; ctx.fillRect(0,0,W,H);
    ctx.restore();

    // ---- 6) charcoal grain over the rim region for ink texture ----
    if(grain.complete!==false){
      ctx.save();
      ctx.globalAlpha=0.5; ctx.globalCompositeOperation='multiply';
      const ringClip=new Path2D();
      for(let i=0;i<N;i++){ const a=(i/N)*TAU-Math.PI/2, rr=rArr[i]+R*0.04;
        const x=CX+Math.cos(a)*rr, y=CY+Math.sin(a)*rr; i===0?ringClip.moveTo(x,y):ringClip.lineTo(x,y); }
      ringClip.closePath(); ringClip.moveTo(CX+Rw*0.96,CY); ringClip.arc(CX,CY,Rw*0.96,0,TAU);
      ctx.clip(ringClip,'evenodd');
      const pat=ctx.createPattern(grain,'repeat');
      ctx.fillStyle=pat; ctx.fillRect(0,0,W,H);
      ctx.restore();
    }

    requestAnimationFrame(draw);
  }

  // ---- voice: prefer NATURAL / neural British male, with a picker ----
  let chosenVoice=null, voices=[];
  const voiceSel=document.getElementById('voice');
  function rankVoice(v){
    let s=0;
    if(/online \(natural\)|natural|neural/i.test(v.name)) s+=30;   // Edge online-natural & neural voices
    if(/enhanced|premium/i.test(v.name)) s+=18;                    // macOS enhanced / premium
    if(/en[-_]GB/i.test(v.lang)) s+=8;
    if(/ryan|thomas|arthur|george|daniel|oliver|alfie/i.test(v.name)) s+=6; // British male names
    if(/google uk english male/i.test(v.name)) s+=5;
    if(/\bmale\b/i.test(v.name)) s+=2;
    if(/female|sonia|libby|maisie|samantha|zira|hazel|kate|serena/i.test(v.name)) s-=10;
    if(/^en/i.test(v.lang)) s+=1;
    return s;
  }
  function refreshVoices(){
    voices=window.speechSynthesis?window.speechSynthesis.getVoices():[];
    if(!voices.length) return;
    voiceSel.innerHTML='';
    voices.forEach((v,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=`${v.name} (${v.lang})`; voiceSel.appendChild(o); });
    let best=0,bs=-1e9; voices.forEach((v,i)=>{const r=rankVoice(v); if(r>bs){bs=r;best=i;}});
    voiceSel.value=best; chosenVoice=voices[best];
    const natural=/online \(natural\)|natural|neural|enhanced|premium/i.test(chosenVoice.name);
    vnameEl.textContent=`voice: ${chosenVoice.name} (${chosenVoice.lang})${natural?' · natural':' · basic — try Edge for natural voices'}`;
  }
  if(voiceSel) voiceSel.addEventListener('change',()=>{ chosenVoice=voices[parseInt(voiceSel.value,10)]; vnameEl.textContent=`voice: ${chosenVoice.name} (${chosenVoice.lang})`; });
  if('speechSynthesis' in window){ refreshVoices(); window.speechSynthesis.onvoiceschanged=refreshVoices; }

  // ---- voice (built-in browser speech) ----
  const speakBtn=document.getElementById('speak'), textInput=document.getElementById('text');

  // JARVIS-style acknowledgement of the day's intent
  function compose(t){
    const a=[`Very good. Today's focus: ${t}.`,
             `Understood. I've set today's plan: ${t}.`,
             `As you wish. Let's make today count — ${t}.`,
             `Right away. Today's agenda: ${t}.`,
             `Noted. We begin with ${t}.`];
    return a[(Math.random()*a.length)|0];
  }

  function speakBrowser(text){
    if(!('speechSynthesis' in window)){ fakeSpeak(text.length*55); return; }
    try{ window.speechSynthesis.resume(); }catch(e){}   // Chrome sometimes pauses the queue
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.rate=0.97; u.pitch=0.96;
    if(chosenVoice) u.voice=chosenVoice;
    u.onstart=()=>{ speaking=true; setState('speaking'); };
    u.onend=()=>{ speaking=false; if(!listening) setState('standby'); };
    u.onerror=()=>{ speaking=false; if(!listening) setState('standby'); };
    window.speechSynthesis.speak(u);
  }
  function fakeSpeak(ms){ speaking=true; setState('speaking'); setTimeout(()=>{ speaking=false; if(!listening) setState('standby'); },ms); }

  function speak(){
    const raw=textInput.value.trim();
    // empty box still speaks a greeting, so Speak always does something
    const line = raw ? compose(raw) : "I'm online and ready. What would you like to do today?";
    speakBrowser(line);
  }
  speakBtn.addEventListener('click',speak);
  textInput.addEventListener('keydown',e=>{ if(e.key==='Enter') speak(); });

  const micBtn=document.getElementById('mic');
  async function toggleMic(){
    if(listening){ listening=false; micBtn.classList.remove('live'); micBtn.textContent='Listen';
      if(micStream) micStream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close();
      analyser=null; audioCtx=null; micStream=null; if(!speaking) setState('standby'); return; }
    try{
      micStream=await navigator.mediaDevices.getUserMedia({audio:true});
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      const src=audioCtx.createMediaStreamSource(micStream);
      analyser=audioCtx.createAnalyser(); analyser.fftSize=256; analyser.smoothingTimeConstant=0.72;
      freqData=new Uint8Array(analyser.frequencyBinCount); src.connect(analyser);
      listening=true; micBtn.classList.add('live'); micBtn.textContent='Stop'; setState('listening');
    }catch(err){ setState('mic denied'); setTimeout(()=>{ if(!speaking&&!listening) setState('standby'); },1800); }
  }
  micBtn.addEventListener('click',toggleMic);

  setInterval(()=>{ clockEl.textContent=new Date().toLocaleTimeString('en-GB'); },1000);
  resize(); requestAnimationFrame(draw);
})();
</script>
</body>
</html>
