<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — DOF Lines Orb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#ffffff; --ink:#2b2f36; --dim:#9aa3ad; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--ink); font-family:'IBM Plex Mono',monospace; overflow:hidden; }
  #gl { position:fixed; inset:0; width:100%; height:100%; display:block; }

  .hud-top { position:fixed; top:20px; left:0; right:0; display:flex; justify-content:space-between;
    padding:0 26px; font-size:11px; letter-spacing:0.28em; color:var(--dim); text-transform:uppercase; pointer-events:none; z-index:3; }
  .hud-top .dot { color:var(--ink); animation:blink 2.6s infinite; }
  @keyframes blink { 0%,70%{opacity:1} 85%{opacity:0.2} 100%{opacity:1} }

  .caption { position:fixed; left:0; right:0; bottom:118px; text-align:center; pointer-events:none; z-index:3; }
  .caption h1 { font-family:'Chakra Petch',sans-serif; font-size:clamp(20px,3.4vw,30px); font-weight:700;
    letter-spacing:0.42em; color:var(--ink); margin-left:0.42em; }
  .caption .state { margin-top:6px; font-size:11px; letter-spacing:0.32em; color:var(--dim); text-transform:uppercase; min-height:14px; }

  .core { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:min(42vw,360px); text-align:center; z-index:3; }
  .core-label { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
  .core-input { width:100%; background:transparent; border:0; border-bottom:1px solid rgba(43,47,54,0.28); outline:0;
    text-align:center; font-family:'Chakra Petch',sans-serif; font-size:clamp(13px,2vw,16px); color:var(--ink); padding:6px 2px; }
  .core-input::placeholder { color:var(--dim); font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.06em; }
  .core-input:focus { border-bottom-color:var(--ink); }

  .console { position:fixed; left:50%; bottom:30px; transform:translateX(-50%); display:flex; gap:10px; flex-wrap:wrap;
    justify-content:center; align-items:center; z-index:3; width:min(94vw,640px); }
  select { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink); background:#fff;
    border:1px solid rgba(43,47,54,0.18); border-radius:2px; padding:13px 12px; max-width:230px; cursor:pointer; }
  button { font-family:'Chakra Petch',sans-serif; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; font-size:12px;
    color:#fff; background:#3c424b; border:0; border-radius:2px; padding:14px 22px; cursor:pointer; transition:transform .12s,box-shadow .2s,background .2s; }
  button:hover { background:#21252b; box-shadow:0 6px 22px rgba(43,47,54,0.22); transform:translateY(-1px); }
  button:active { transform:translateY(0); }
  button.ghost { background:#fff; color:#3c424b; border:1px solid rgba(43,47,54,0.25); }
  button.ghost:hover { background:#f2f3f5; }
  button.ghost.live { color:#fff; background:#3c424b; }

  .vname { position:fixed; left:0; right:0; bottom:14px; text-align:center; font-size:10px; color:var(--dim); letter-spacing:0.12em; z-index:3; pointer-events:none; }
  .hint { position:fixed; right:26px; bottom:90px; text-align:right; font-size:10px; color:var(--dim); letter-spacing:0.12em; line-height:1.7; z-index:3; pointer-events:none; }
  .hint b { color:#5b6470; font-weight:500; }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="hud-top"><span><span class="dot">●</span> SYS / ONLINE</span><span id="clock">--:--:--</span></div>

  <div class="core">
    <div class="core-label">What would you like to do today?</div>
    <input id="text" class="core-input" type="text" placeholder="type here, then press Enter" autocomplete="off">
  </div>

  <div class="caption"><h1>ARIA</h1><div class="state" id="state">standby</div></div>

  <div class="hint">
    <span><b>o / p</b> focal length</span><br>
    <span><b>k / l</b> bokeh strength</span><br>
    <span><b>v / b</b> exposure</span><br>
    <span><b>m</b> focal equation</span>
  </div>

  <div class="console">
    <select id="voice" title="Voice"><option>loading voices…</option></select>
    <button id="speak">Speak</button>
    <button id="mic" class="ghost">Listen</button>
  </div>
  <div class="vname" id="vname">voice: detecting…</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================================
   DOF LINES ORB — Domenico Brunetti "Blurry" technique
   Lines are drawn as a dense cloud of particles. Each particle is displaced
   within a circle (the bokeh disk) whose radius grows with distance from the
   focal plane, accumulated into a float texture, then tonemapped with exposure.
============================================================================ */

/* ---------- tiny value-noise + curl flow field (CPU, builds the orb) ------- */
function hash3(x,y,z){
  let h = Math.sin(x*127.1 + y*311.7 + z*74.7) * 43758.5453;
  return h - Math.floor(h);
}
function vnoise(x,y,z){
  const xi=Math.floor(x), yi=Math.floor(y), zi=Math.floor(z);
  const xf=x-xi, yf=y-yi, zf=z-zi;
  const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf), w=zf*zf*(3-2*zf);
  function L(a,b,t){ return a+(b-a)*t; }
  const c000=hash3(xi,yi,zi),     c100=hash3(xi+1,yi,zi);
  const c010=hash3(xi,yi+1,zi),   c110=hash3(xi+1,yi+1,zi);
  const c001=hash3(xi,yi,zi+1),   c101=hash3(xi+1,yi,zi+1);
  const c011=hash3(xi,yi+1,zi+1), c111=hash3(xi+1,yi+1,zi+1);
  return L( L(L(c000,c100,u),L(c010,c110,u),v), L(L(c001,c101,u),L(c011,c111,u),v), w )*2-1;
}
function fbm(x,y,z){
  let a=0, amp=0.5, f=1;
  for(let o=0;o<3;o++){ a+=amp*vnoise(x*f,y*f,z*f); f*=2.03; amp*=0.5; }
  return a;
}
// curl of an fbm potential field → divergence-free, swirly flow
function curl(x,y,z){
  const e=0.12, i=1/(2*e);
  const p1=fbm(x,y+e,z),   p2=fbm(x,y-e,z);
  const p3=fbm(x,y,z+e),   p4=fbm(x,y,z-e);
  const p5=fbm(x+e,y,z),   p6=fbm(x-e,y,z);
  const q1=fbm(x+19.1,y,z+e), q2=fbm(x+19.1,y,z-e);
  const q3=fbm(x+19.1,y+e,z), q4=fbm(x+19.1,y-e,z);
  const cx=(p1-p2)*i - (p3-p4)*i;
  const cy=(p3-p4)*i - (p5-p6)*i;
  const cz=(q3-q4)*i - (q1-q2)*i;
  return [cx,cy,cz];
}

/* ---------- build the orb: streamlines on a spherical shell --------------- */
const NUM_LINES   = 9000;
const STEPS       = 90;     // sub-samples per filament (random-t fills between them)
const STEP_LEN    = 0.013;
const RADIUS      = 1.0;    // orb radius
const SHELL_PULL  = 0.40;   // looser → wispy hairs escape the silhouette

// each rendered vertex is one short sub-segment: position (p0) → aPos1 (p1).
// the shader picks a random t∈[0,1] along it every draw → continuous filaments.
const SEGS = STEPS - 1;
const N = NUM_LINES * SEGS;
const positions = new Float32Array(N*3);
const pos1      = new Float32Array(N*3);
const seeds     = new Float32Array(N*2);
const lineT     = new Float32Array(N);

let w=0;
for(let l=0; l<NUM_LINES; l++){
  // random seed point on the sphere
  const uu=Math.random()*2-1, th=Math.random()*Math.PI*2;
  const ss=Math.sqrt(1-uu*uu);
  let px=ss*Math.cos(th)*RADIUS, py=ss*Math.sin(th)*RADIUS, pz=uu*RADIUS;
  const lineSeed=Math.random();
  for(let st=0; st<SEGS; st++){
    // current point p0
    const p0x=px, p0y=py, p0z=pz;
    // advance through curl field → next point p1
    const [vx,vy,vz]=curl(px*1.6, py*1.6, pz*1.6);
    px+=vx*STEP_LEN; py+=vy*STEP_LEN; pz+=vz*STEP_LEN;
    const d=Math.hypot(px,py,pz)||1e-6;
    const k=(RADIUS-d)/d*SHELL_PULL;   // pull back toward the shell
    px+=px*k; py+=py*k; pz+=pz*k;

    const idx=w*3;
    positions[idx]=p0x; positions[idx+1]=p0y; positions[idx+2]=p0z;
    pos1[idx]=px;       pos1[idx+1]=py;       pos1[idx+2]=pz;
    seeds[w*2]=lineSeed*131.0 + st*0.137;     // stable per-segment seed
    seeds[w*2+1]=Math.random()*97.0;
    lineT[w]=st/(SEGS-1);
    w++;
  }
}

const geo=new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('aPos1',    new THREE.BufferAttribute(pos1,3));
geo.setAttribute('aSeed',    new THREE.BufferAttribute(seeds,2));
geo.setAttribute('aLineT',   new THREE.BufferAttribute(lineT,1));

/* ---------- renderer / scene / camera ------------------------------------- */
const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas, antialias:false, powerPreference:'high-performance'});
renderer.setClearColor(0x000000,1);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,1,0.1,100);

let DPR=Math.min(window.devicePixelRatio||1,1.75);
let accumRT;
function makeRT(w,h){
  return new THREE.WebGLRenderTarget(w,h,{
    type:THREE.HalfFloatType, format:THREE.RGBAFormat,
    minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter, depthBuffer:false
  });
}
function resize(){
  const w=Math.floor(innerWidth*DPR), h=Math.floor(innerHeight*DPR);
  renderer.setPixelRatio(1);
  renderer.setSize(innerWidth,innerHeight,false);
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  if(accumRT) accumRT.dispose();
  accumRT=makeRT(w,h);
}
window.addEventListener('resize',resize);

/* ---------- DOF accumulation material (points) ---------------------------- */
const pointsMat=new THREE.ShaderMaterial({
  uniforms:{
    uFocalDepth:{value:3.7},     // view-space distance to focal plane (front pole)
    uBokeh:{value:0.02},         // bokehStrength (Blurry default ~0.02)
    uMinSize:{value:0.0016},     // minimumLineSize — in-focus hairline thickness
    uFocalPow:{value:1.0},       // focalPowerFunction: 0 linear, 1 → pow(dist,1.5)
    uAtten:{value:0.55},         // distanceAttenuation (exp falloff outside focus)
    uSampleSeed:{value:0.0},     // changes each accumulation sample
    uBright:{value:1.0},         // global brightness (audio)
    uShimmer:{value:0.0},        // per-line shimmer amount (audio)
    uTime:{value:0.0}
  },
  vertexShader:`
    precision highp float;
    attribute vec3 aPos1;
    attribute vec2 aSeed;
    attribute float aLineT;
    uniform float uFocalDepth, uBokeh, uMinSize, uFocalPow, uAtten, uSampleSeed, uShimmer, uTime;
    varying float vGlow;
    // hash12 (Dave Hoskins, https://www.shadertoy.com/view/4djSRW) — integer-style hash
    float hash12(vec2 p){
      vec3 p3 = fract(vec3(p.xyx) * 0.1031);
      p3 += dot(p3, p3.yzx + 19.19);
      return fract((p3.x + p3.y) * p3.z);
    }
    void main(){
      vec2 sd = aSeed + uSampleSeed;
      // pick a random point along the sub-segment → continuous filament
      float t = hash12(sd + 1.3);
      vec3 p = mix(position, aPos1, t);
      vec4 mv = modelViewMatrix * vec4(p,1.0);

      float dist = abs(mv.z - (-uFocalDepth));        // distance from focal plane
      if(uFocalPow > 0.5) dist = pow(dist, 1.5);
      float R = max(dist * uBokeh, uMinSize);         // circle of confusion radius

      // uniform point inside a sphere (Blurry's bokeh sampling) → soft disc on screen
      float lambda = hash12(sd + 2.7);
      float u  = hash12(sd + 5.1) * 2.0 - 1.0;
      float phi = hash12(sd + 8.9) * 6.2831853;
      float cr = R * pow(lambda, 0.3333);
      float sx = sqrt(1.0 - u*u);
      mv.xyz += vec3(cr*sx*cos(phi), cr*sx*sin(phi), cr*u);

      gl_Position = projectionMatrix * mv;
      gl_PointSize = 1.0;

      // exp distance attenuation + audio shimmer
      float shim = 1.0 + uShimmer * sin(uTime*3.0 + aSeed.x*0.4);
      vGlow = exp(-dist * uAtten) * shim;
    }`,
  fragmentShader:`
    precision highp float;
    uniform float uBright;
    varying float vGlow;
    void main(){
      // 1px additive splat; line/fog density is built by accumulation
      gl_FragColor = vec4(vec3(vGlow * uBright), 1.0);
    }`,
  transparent:true, depthTest:false, depthWrite:false,
  blending:THREE.CustomBlending, blendEquation:THREE.AddEquation,
  blendSrc:THREE.OneFactor, blendDst:THREE.OneFactor
});
const cloud=new THREE.Points(geo,pointsMat);
scene.add(cloud);

/* ---------- tonemap / display pass ---------------------------------------- */
const quadScene=new THREE.Scene();
const quadCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const displayMat=new THREE.ShaderMaterial({
  uniforms:{ uTex:{value:null}, uExposure:{value:0.81}, uSamples:{value:1.0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
  fragmentShader:`
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D uTex; uniform float uExposure, uSamples;
    void main(){
      // Blurry tonemap: divide by (samples*exposure), Reinhard hdr/(hdr+1)
      float acc = texture2D(uTex,vUv).r;
      float hdr = acc / (uSamples * uExposure);
      float mapped = hdr / (hdr + 1.0);              // 0..1 luminance
      // INVERTED: ink on white instead of light on black — medium light grey
      vec3 ink = vec3(0.26,0.28,0.32);
      vec3 col = mix(vec3(1.0), ink, clamp(mapped,0.0,1.0));
      gl_FragColor = vec4(col,1.0);
    }`,
  depthTest:false, depthWrite:false
});
quadScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), displayMat));

resize();

/* ============================================================================
   AUDIO REACTIVITY — ported from ai-entity.html
============================================================================ */
const stateEl=document.getElementById('state'), clockEl=document.getElementById('clock'), vnameEl=document.getElementById('vname');
let speaking=false, listening=false, speakEnergy=0, micLevel=0, agit=0;
let analyser=null, freqData=null, audioCtx=null, micStream=null;
function setState(t){ stateEl.textContent=t; }

let chosenVoice=null, voices=[];
const voiceSel=document.getElementById('voice');
function rankVoice(v){
  let s=0;
  if(/online \(natural\)|natural|neural/i.test(v.name)) s+=30;
  if(/enhanced|premium/i.test(v.name)) s+=18;
  if(/en[-_]GB/i.test(v.lang)) s+=8;
  if(/ryan|thomas|arthur|george|daniel|oliver|alfie/i.test(v.name)) s+=6;
  if(/google uk english male/i.test(v.name)) s+=5;
  if(/\bmale\b/i.test(v.name)) s+=2;
  if(/female|sonia|libby|maisie|samantha|zira|hazel|kate|serena/i.test(v.name)) s-=10;
  if(/^en/i.test(v.lang)) s+=1;
  return s;
}
function refreshVoices(){
  voices=window.speechSynthesis?window.speechSynthesis.getVoices():[];
  if(!voices.length) return;
  voiceSel.innerHTML='';
  voices.forEach((v,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=`${v.name} (${v.lang})`; voiceSel.appendChild(o); });
  let best=0,bs=-1e9; voices.forEach((v,i)=>{const r=rankVoice(v); if(r>bs){bs=r;best=i;}});
  voiceSel.value=best; chosenVoice=voices[best];
  const natural=/online \(natural\)|natural|neural|enhanced|premium/i.test(chosenVoice.name);
  vnameEl.textContent=`voice: ${chosenVoice.name} (${chosenVoice.lang})${natural?' · natural':' · basic — try Edge for natural voices'}`;
}
voiceSel.addEventListener('change',()=>{ chosenVoice=voices[parseInt(voiceSel.value,10)]; vnameEl.textContent=`voice: ${chosenVoice.name} (${chosenVoice.lang})`; });
if('speechSynthesis' in window){ refreshVoices(); window.speechSynthesis.onvoiceschanged=refreshVoices; }

const speakBtn=document.getElementById('speak'), textInput=document.getElementById('text');
function compose(t){
  const a=[`Very good. Today's focus: ${t}.`,
           `Understood. I've set today's plan: ${t}.`,
           `As you wish. Let's make today count — ${t}.`,
           `Right away. Today's agenda: ${t}.`,
           `Noted. We begin with ${t}.`];
  return a[(Math.random()*a.length)|0];
}
function speakBrowser(text){
  if(!('speechSynthesis' in window)){ fakeSpeak(text.length*55); return; }
  try{ window.speechSynthesis.resume(); }catch(e){}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.rate=0.97; u.pitch=0.96;
  if(chosenVoice) u.voice=chosenVoice;
  u.onstart=()=>{ speaking=true; setState('speaking'); };
  u.onend=()=>{ speaking=false; if(!listening) setState('standby'); };
  u.onerror=()=>{ speaking=false; if(!listening) setState('standby'); };
  window.speechSynthesis.speak(u);
}
function fakeSpeak(ms){ speaking=true; setState('speaking'); setTimeout(()=>{ speaking=false; if(!listening) setState('standby'); },ms); }
function speak(){
  const raw=textInput.value.trim();
  const line = raw ? compose(raw) : "I'm online and ready. What would you like to do today?";
  speakBrowser(line);
}
speakBtn.addEventListener('click',speak);
textInput.addEventListener('keydown',e=>{ if(e.key==='Enter') speak(); });

const micBtn=document.getElementById('mic');
async function toggleMic(){
  if(listening){ listening=false; micBtn.classList.remove('live'); micBtn.textContent='Listen';
    if(micStream) micStream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close();
    analyser=null; audioCtx=null; micStream=null; if(!speaking) setState('standby'); return; }
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(micStream);
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256; analyser.smoothingTimeConstant=0.72;
    freqData=new Uint8Array(analyser.frequencyBinCount); src.connect(analyser);
    listening=true; micBtn.classList.add('live'); micBtn.textContent='Stop'; setState('listening');
  }catch(err){ setState('mic denied'); setTimeout(()=>{ if(!speaking&&!listening) setState('standby'); },1800); }
}
micBtn.addEventListener('click',toggleMic);
setInterval(()=>{ clockEl.textContent=new Date().toLocaleTimeString('en-GB'); },1000);

/* ---------- keyboard controls (match reference) --------------------------- */
addEventListener('keydown',e=>{
  const u=pointsMat.uniforms;
  if(e.key==='o') u.uFocalDepth.value=Math.max(2.0,u.uFocalDepth.value-0.15);
  if(e.key==='p') u.uFocalDepth.value=Math.min(9.0,u.uFocalDepth.value+0.15);
  if(e.key==='k') u.uBokeh.value=Math.max(0.0,u.uBokeh.value-0.002);
  if(e.key==='l') u.uBokeh.value=Math.min(0.06,u.uBokeh.value+0.002);
  // exposure is a divisor (Blurry): smaller → more ink. v = more ink, b = less.
  const ex=displayMat.uniforms.uExposure;
  if(e.key==='v') ex.value=Math.max(0.03,ex.value*0.85);
  if(e.key==='b') ex.value=Math.min(3.0,ex.value*1.18);
  if(e.key==='m') u.uFocalPow.value = u.uFocalPow.value>0.5?0.0:1.0;  // focal strength eqn
});

/* ============================================================================
   RENDER LOOP — per-frame K-sample bokeh accumulation
============================================================================ */
const SAMPLES=8;        // accumulation samples per frame → fills the bokeh disk
let baseSeed=0;
let mem=0;              // speaker-membrane displacement (fast peak-follower of the voice)
let camAng=0, cloudAng=0, lastT=0;   // accumulated spin (so speed can ease to 0 when speaking)
const clock=new THREE.Clock();

function frame(){
  const t=clock.getElapsedTime();
  const time=t*1000;

  // ---- audio envelope (ported model) ----
  if(speaking){ const tgt=0.5+0.5*Math.abs(Math.sin(time*0.011)*Math.cos(time*0.019)); speakEnergy+=(tgt-speakEnergy)*0.18; }
  else speakEnergy+=(0-speakEnergy)*0.06;
  if(analyser){ analyser.getByteFrequencyData(freqData); let s=0; for(let i=0;i<freqData.length;i++) s+=freqData[i]; micLevel=(s/freqData.length)/255; }
  else micLevel+=(0-micLevel)*0.1;
  agit+=(Math.min(1,speakEnergy+micLevel*1.6)-agit)*0.2;

  // ---- map audio → orb ----
  const u=pointsMat.uniforms;
  u.uBright.value   = 1.0 + agit*1.1;
  u.uShimmer.value  = 0.12 + agit*0.4;
  u.uTime.value     = t;
  // exposure stays user-controlled via v/b; audio reactivity flows through uBright

  // ---- camera orbit + cloud spin: full when silent, eased to a STOP while speaking ----
  const dt = Math.min(0.05, t - lastT); lastT = t;
  const spin = 1.0 - Math.min(1, agit*1.4);   // voice gate → 0 = stopped
  camAng   += 0.12 * dt * spin;
  cloudAng += 0.05 * dt * spin;
  const camR = 4.6;
  camera.position.set(Math.cos(camAng)*camR, Math.sin(camAng*0.6)*1.1, Math.sin(camAng)*camR);
  camera.lookAt(0,0,0);
  // focal plane on the FRONT pole → sharp central sparkle, rest blurs to fog
  u.uFocalDepth.value += ((camR - RADIUS*0.92) - u.uFocalDepth.value)*0.1;
  cloud.rotation.y = cloudAng;

  // ---- speaker membrane: punches out on the voice's energy, snaps back, vibrates ----
  // instantaneous drive: real mic level; syllable-rate transients during TTS (no real audio)
  let drive = micLevel*1.9;
  if(speaking) drive = Math.max(drive, speakEnergy * Math.abs(Math.sin(t*6.5)) * (0.6 + 0.4*Math.sin(t*17.0)));
  drive = Math.min(1, drive);
  mem += (drive - mem) * (drive>mem ? 0.7 : 0.28);       // fast attack / quick release → cone snap
  const ripple = Math.sin(t*20.0) * mem * 0.045;         // fast membrane vibration, only when energised
  const sc = 1.0 + 0.008*Math.sin(t*1.3) + mem*0.13 + ripple;
  cloud.scale.setScalar(sc);

  // ---- accumulate K bokeh samples into the float target ----
  renderer.setRenderTarget(accumRT);
  renderer.autoClear=false;
  renderer.clear(true,true,true);
  for(let s=0;s<SAMPLES;s++){
    u.uSampleSeed.value = baseSeed + s*1.6180339;
    renderer.render(scene,camera);
  }
  baseSeed += 0.371;

  // ---- tonemap to screen ----
  displayMat.uniforms.uTex.value=accumRT.texture;
  displayMat.uniforms.uSamples.value=SAMPLES;
  renderer.setRenderTarget(null);
  renderer.render(quadScene,quadCam);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
